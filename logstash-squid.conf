input {
  # Recibir logs syslog desde cualquier host
  syslog {
    port => 514
    type => "syslog"
    tags => ["squid"]
  }
  
  # Opcional: recibir logs UDP directos
  udp {
    port => 5000
    codec => "plain"
    tags => ["squid"]
  }
}

filter {
  # Solo procesar eventos que vienen de squid
  if "squid" in [tags] or [program] == "squid" {
    
    # El mensaje syslog ya viene parseado, pero necesitamos extraer el log de squid
    grok {
      match => { 
        "message" => "%{SQUID3}"
      }
      patterns_dir => ["/usr/share/logstash/patterns"]
      tag_on_failure => ["_grokparsefailure_squid"]
    }
    
    
    # Convertir timestamp UNIX a fecha
    date {
      match => ["timestamp", "UNIX"]
      target => "@timestamp"
    }
    
    # Convertir tipos de datos
    mutate {
      convert => {
        "duration" => "float"
        "bytes_sent" => "integer"
        "http_status" => "integer"
      }
    }
    
    # Agregar metadata del servidor
    mutate {
      add_field => {
        "[squid][server]" => "%{host}"
        "[squid][duration_seconds]" => "%{duration}"
      }
    }
    
    # Enriquecer con geolocalización (solo IPs públicas)
    if [client_ip] !~ /^127\.|^10\.|^172\.(1[6-9]|2[0-9]|3[01])\.|^192\.168\./ {
      geoip {
        source => "client_ip"
        target => "geoip"
        tag_on_failure => []
      }
    }
    
    # Clasificar el log
    if [squid_status] =~ /DENIED|BLOCK/ {
      mutate { add_tag => ["blocked"] }
    } else if [squid_status] == "HIT" {
      mutate { add_tag => ["cache_hit"] }
    } else if [squid_status] == "MISS" {
      mutate { add_tag => ["cache_miss"] }
    }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS}"]
    user => "${ELASTICSEARCH_USER}"
    password => "${ELASTICSEARCH_PASSWORD}"
    index => "squid-logs-%{+YYYY.MM.dd}"
  }
  
  # Para debugging, ver logs en consola
  stdout {
    codec => rubydebug
  }
}