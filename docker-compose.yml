version: '3.8'

services:
  elasticsearch:
    image: elasticsearch:8.11.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    networks:
      - elastic
    restart: unless-stopped

  kibana:
    image: kibana:8.11.3
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - elastic
    restart: unless-stopped

  logstash:
    image: logstash/logstash:8.11.3
    user: root
    container_name: logstash
    ports:
      - "514:514/udp"           # Puerto syslog UDP
      - "514:514/tcp"           # Puerto syslog TCP (por si acaso)
      - "5000:5000/udp"         # Opcional: para otros formatos (UDP)
    volumes:
      - ./logstash-squid.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./patterns:/usr/share/logstash/patterns:ro   # Para patrones personalizados
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USER=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
    networks:
      - elastic
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  es_data:
    driver: local

networks:
  elastic:
    driver: bridge
